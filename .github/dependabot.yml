version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:30"
    open-pull-requests-limit: 10
    groups:
      nuget-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "docker"
    directory: "/apps/public-web"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker"
    directory: "/apps/account-web"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker"
    directory: "/apps/crm-web"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker"
    directory: "/apps/tools-web"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker"
    directory: "/services/auth/deploy"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker"
    directory: "/services/account/src/NetMetric.Account.API"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker"
    directory: "/services/crm/src/NetMetric.CRM.API"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker"
    directory: "/services/tools/src/NetMetric.Tools.API"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker"
    directory: "/services/notification/src/NetMetric.Notification.Worker"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker"
    directory: "/platform/gateway/src/NetMetric.ApiGateway"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
