name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    uses: ./.github/workflows/frontend.yml

  auth-backend:
    name: Auth Backend
    uses: ./.github/workflows/dotnet-auth.yml

  security:
    name: Security
    uses: ./.github/workflows/security.yml
