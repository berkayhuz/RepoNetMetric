name: Core Backend Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "release/**"
    tags:
      - "v*.*.*"
    paths:
      - "services/auth/**"
      - "services/account/**"
      - "services/crm/**"
      - "services/notification/**"
      - "platform/gateway/**"
      - "packages/dotnet/**"
      - "global.json"
      - "Directory.Build.props"
      - "Directory.Build.targets"
      - "Directory.Packages.props"
      - "NetMetric.slnx"
      - ".github/workflows/core-backend-images.yml"
  pull_request:
    paths:
      - "services/auth/**"
      - "services/account/**"
      - "services/crm/**"
      - "services/notification/**"
      - "platform/gateway/**"
      - "packages/dotnet/**"
      - "global.json"
      - "Directory.Build.props"
      - "Directory.Build.targets"
      - "Directory.Packages.props"
      - "NetMetric.slnx"
      - ".github/workflows/core-backend-images.yml"

permissions:
  contents: read
  packages: write

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - run: dotnet restore NetMetric.slnx --force-evaluate
      - run: dotnet build NetMetric.slnx -c Release --no-restore -m:1 -v minimal
      - run: dotnet test NetMetric.slnx -c Release --no-build -m:1 -v minimal

  build:
    needs: gate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: auth-api
            file: services/auth/deploy/Dockerfile
            image: ghcr.io/netmetric/auth-api
          - name: account-api
            file: services/account/src/NetMetric.Account.API/Dockerfile
            image: ghcr.io/netmetric/account-api
          - name: crm-api
            file: services/crm/src/NetMetric.CRM.API/Dockerfile
            image: ghcr.io/netmetric/crm-api
          - name: gateway
            file: platform/gateway/src/NetMetric.ApiGateway/Dockerfile
            image: ghcr.io/netmetric/gateway
          - name: notification-worker
            file: services/notification/src/NetMetric.Notification.Worker/Dockerfile
            image: ghcr.io/netmetric/notification-worker
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha,prefix=,format=long
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') }}
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.file }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
