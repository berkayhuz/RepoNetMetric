name: Security

on:
  workflow_dispatch:
  workflow_call:

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install gitleaks
        run: curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/install.sh | sh -s -- -b /usr/local/bin

      - name: Run gitleaks
        run: gitleaks git --config=.gitleaks.toml --redact --report-format sarif --report-path gitleaks.sarif

      - name: NPM audit (high+)
        run: pnpm audit --audit-level=high

      - name: Dotnet vulnerable package audit (high+)
        shell: bash
        run: |
          dotnet restore NetMetric.slnx --force-evaluate
          REPORT="$(dotnet list NetMetric.slnx package --vulnerable --include-transitive)"
          echo "$REPORT"
          if echo "$REPORT" | grep -Ei "Severity:[[:space:]]*(Critical|High)" >/dev/null; then
            echo "High/Critical .NET vulnerabilities detected."
            exit 1
          fi

      - name: Upload SARIF
        if: ${{ always() }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
