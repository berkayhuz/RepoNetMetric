apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-web
  namespace: netmetric
  labels:
    app.kubernetes.io/name: account-web
    app.kubernetes.io/part-of: netmetric
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: account-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: account-web
        app.kubernetes.io/part-of: netmetric
    spec:
      serviceAccountName: account-web
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: account-web
          image: ghcr.io/netmetric/account-web:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7004
          envFrom:
            - configMapRef:
                name: account-web-env
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
