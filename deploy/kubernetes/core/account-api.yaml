apiVersion: v1
kind: ConfigMap
metadata:
  name: account-api-env
  namespace: netmetric
  labels: { app.kubernetes.io/part-of: netmetric, app.kubernetes.io/name: account-api }
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:8080"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-api
  namespace: netmetric
  labels: { app.kubernetes.io/part-of: netmetric, app.kubernetes.io/name: account-api }
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: account-api } }
  template:
    metadata:
      { labels: { app.kubernetes.io/part-of: netmetric, app.kubernetes.io/name: account-api } }
    spec:
      serviceAccountName: account-api
      containers:
        - name: account-api
          image: ghcr.io/netmetric/account-api:${IMAGE_TAG}
          ports: [{ name: http, containerPort: 8080 }]
          envFrom:
            [
              { configMapRef: { name: account-api-env } },
              { secretRef: { name: account-api-secrets } },
            ]
          readinessProbe:
            {
              httpGet: { path: /health/ready, port: http },
              initialDelaySeconds: 10,
              periodSeconds: 10,
            }
          livenessProbe:
            {
              httpGet: { path: /health/live, port: http },
              initialDelaySeconds: 20,
              periodSeconds: 20,
            }
          securityContext:
            {
              allowPrivilegeEscalation: false,
              readOnlyRootFilesystem: true,
              capabilities: { drop: ["ALL"] },
              runAsNonRoot: true,
              seccompProfile: { type: RuntimeDefault },
            }
          resources:
            { requests: { cpu: 100m, memory: 256Mi }, limits: { cpu: 600m, memory: 768Mi } }
---
apiVersion: v1
kind: Service
metadata:
  name: account-api
  namespace: netmetric
spec:
  selector: { app.kubernetes.io/name: account-api }
  ports: [{ name: http, port: 8080, targetPort: http }]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: account-api
  namespace: netmetric
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: account-api
  namespace: netmetric
spec:
  minAvailable: 1
  selector: { matchLabels: { app.kubernetes.io/name: account-api } }
