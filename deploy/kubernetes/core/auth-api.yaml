apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-api-env
  namespace: netmetric
  labels: { app.kubernetes.io/part-of: netmetric, app.kubernetes.io/name: auth-api }
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:8080"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-api
  namespace: netmetric
  labels: { app.kubernetes.io/part-of: netmetric, app.kubernetes.io/name: auth-api }
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: auth-api } }
  template:
    metadata: { labels: { app.kubernetes.io/part-of: netmetric, app.kubernetes.io/name: auth-api } }
    spec:
      serviceAccountName: auth-api
      containers:
        - name: auth-api
          image: ghcr.io/netmetric/auth-api:${IMAGE_TAG}
          ports: [{ name: http, containerPort: 8080 }]
          envFrom:
            - configMapRef: { name: auth-api-env }
            - secretRef: { name: auth-api-secrets }
          readinessProbe:
            {
              httpGet: { path: /health/ready, port: http },
              initialDelaySeconds: 10,
              periodSeconds: 10,
            }
          livenessProbe:
            {
              httpGet: { path: /health/live, port: http },
              initialDelaySeconds: 20,
              periodSeconds: 20,
            }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
            runAsNonRoot: true
            seccompProfile: { type: RuntimeDefault }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 600m, memory: 768Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: auth-api
  namespace: netmetric
  labels: { app.kubernetes.io/part-of: netmetric, app.kubernetes.io/name: auth-api }
spec:
  selector: { app.kubernetes.io/name: auth-api }
  ports: [{ name: http, port: 8080, targetPort: http }]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth-api
  namespace: netmetric
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: auth-api
  namespace: netmetric
spec:
  minAvailable: 1
  selector: { matchLabels: { app.kubernetes.io/name: auth-api } }
