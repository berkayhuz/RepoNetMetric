apiVersion: v1
kind: ConfigMap
metadata:
  name: crm-api-env
  namespace: netmetric
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:8080"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-api
  namespace: netmetric
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: crm-api } }
  template:
    metadata: { labels: { app.kubernetes.io/name: crm-api, app.kubernetes.io/part-of: netmetric } }
    spec:
      serviceAccountName: crm-api
      containers:
        - name: crm-api
          image: ghcr.io/netmetric/crm-api:${IMAGE_TAG}
          ports: [{ name: http, containerPort: 8080 }]
          envFrom:
            [{ configMapRef: { name: crm-api-env } }, { secretRef: { name: crm-api-secrets } }]
          readinessProbe:
            {
              httpGet: { path: /health/ready, port: http },
              initialDelaySeconds: 10,
              periodSeconds: 10,
            }
          livenessProbe:
            {
              httpGet: { path: /health/live, port: http },
              initialDelaySeconds: 20,
              periodSeconds: 20,
            }
          securityContext:
            {
              allowPrivilegeEscalation: false,
              readOnlyRootFilesystem: true,
              capabilities: { drop: ["ALL"] },
              runAsNonRoot: true,
              seccompProfile: { type: RuntimeDefault },
            }
          resources: { requests: { cpu: 150m, memory: 384Mi }, limits: { cpu: 1200m, memory: 1Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: crm-api
  namespace: netmetric
spec:
  selector: { app.kubernetes.io/name: crm-api }
  ports: [{ name: http, port: 8080, targetPort: http }]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: crm-api
  namespace: netmetric
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: crm-api
  namespace: netmetric
spec:
  minAvailable: 1
  selector: { matchLabels: { app.kubernetes.io/name: crm-api } }
