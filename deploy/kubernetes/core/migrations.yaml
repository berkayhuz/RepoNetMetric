apiVersion: batch/v1
kind: Job
metadata:
  name: auth-db-migrate
  namespace: netmetric
spec:
  backoffLimit: 2
  template:
    spec:
      serviceAccountName: auth-api
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/netmetric/auth-api:${IMAGE_TAG}
          command:
            [
              "dotnet",
              "ef",
              "database",
              "update",
              "--project",
              "services/auth/src/NetMetric.Auth.Infrastructure/NetMetric.Auth.Infrastructure.csproj",
              "--startup-project",
              "services/auth/src/NetMetric.Auth.API/NetMetric.Auth.API.csproj",
            ]
          envFrom: [{ secretRef: { name: auth-api-secrets } }]
          resources:
            { requests: { cpu: 100m, memory: 256Mi }, limits: { cpu: 500m, memory: 512Mi } }
---
