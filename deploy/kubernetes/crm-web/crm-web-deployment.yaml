apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-web
  namespace: netmetric
  labels:
    app.kubernetes.io/name: crm-web
    app.kubernetes.io/part-of: netmetric
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: crm-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: crm-web
        app.kubernetes.io/part-of: netmetric
    spec:
      serviceAccountName: crm-web
      containers:
        - name: crm-web
          image: ghcr.io/netmetric/crm-web:REPLACE_WITH_GIT_SHA
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7006
          envFrom:
            - configMapRef:
                name: crm-web-env
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
