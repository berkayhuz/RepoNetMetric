apiVersion: apps/v1
kind: Deployment
metadata:
  name: tools-api
  namespace: netmetric
  labels:
    app.kubernetes.io/name: tools-api
    app.kubernetes.io/part-of: netmetric
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: tools-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tools-api
        app.kubernetes.io/part-of: netmetric
    spec:
      serviceAccountName: tools-api
      containers:
        - name: tools-api
          image: ghcr.io/netmetric/tools-api:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: tools-api-env
            - secretRef:
                name: tools-api-secrets
          volumeMounts:
            - name: artifacts
              mountPath: /var/lib/netmetric/tools-artifacts
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 768Mi
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: tools-api-artifacts
        - name: tmp
          emptyDir: {}
