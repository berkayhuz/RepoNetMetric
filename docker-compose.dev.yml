services:
  netmetric-sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: netmetric-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "NetMetric.Dev.Sql.2026!"
      MSSQL_PID: "Developer"
    ports:
      - "14333:1433"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" -b -o /dev/null',
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 25s
    volumes:
      - netmetric_sql_data:/var/opt/mssql

  netmetric-redis:
    image: redis:7.2-alpine
    container_name: netmetric-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  netmetric-rabbitmq:
    image: rabbitmq:3.13-management
    container_name: netmetric-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "guest"
      RABBITMQ_DEFAULT_PASS: "guest"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  netmetric-sonar-db:
    image: postgres:17
    container_name: netmetric-sonar-db
    environment:
      POSTGRES_DB: sonar
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonar"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - netmetric_sonar_db_data:/var/lib/postgresql/data

  netmetric-sonarqube:
    image: sonarqube:community
    container_name: netmetric-sonarqube
    depends_on:
      netmetric-sonar-db:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://netmetric-sonar-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/api/system/status"]
      interval: 20s
      timeout: 5s
      retries: 30
      start_period: 30s
    volumes:
      - netmetric_sonarqube_data:/opt/sonarqube/data
      - netmetric_sonarqube_extensions:/opt/sonarqube/extensions
      - netmetric_sonarqube_logs:/opt/sonarqube/logs

volumes:
  netmetric_sql_data:
  netmetric_sonar_db_data:
  netmetric_sonarqube_data:
  netmetric_sonarqube_extensions:
  netmetric_sonarqube_logs:
