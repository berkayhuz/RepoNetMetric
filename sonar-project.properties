sonar.projectKey=netmetric_frontend_monorepo
sonar.projectName=NetMetric Frontend Monorepo
sonar.sourceEncoding=UTF-8

sonar.sources=apps,packages/frontend
sonar.tests=packages/frontend/ui/src/test,packages/frontend/config/src/test

sonar.inclusions=**/*.ts,**/*.tsx,**/*.js,**/*.mjs,**/*.css
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/build/**,**/coverage/**,**/.turbo/**,**/*.d.ts,**/*.generated.*,**/generated/**,**/vendor/**
sonar.cpd.exclusions=**/*.test.ts,**/*.test.tsx

sonar.javascript.lcov.reportPaths=packages/frontend/ui/coverage/lcov.info,packages/frontend/config/coverage/lcov.info
sonar.typescript.tsconfigPaths=packages/frontend/ui/tsconfig.json,packages/frontend/config/tsconfig.json,packages/frontend/types/tsconfig.json
